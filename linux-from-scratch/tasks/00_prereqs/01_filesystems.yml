---

- name: gather Linux from Scratch disk by id via ansible bootstrap
  ansible.builtin.find:
    paths: /dev/disk/by-id
    patterns: "*{{ ansible_local.bootstrap.lfs_disk }}"
    file_type: "link"
  register: lfs_disk_bootstrap

- name: verify list of disks length is equal to one
  ansible.builtin.fail:
    msg: "expected exactly one disk, found {{ lfs_disk_bootstrap.matched }}"
  when: lfs_disk_bootstrap.matched != 1

- name: store Linux from Scratch disk path to a variable for ease of use
  ansible.builtin.set_fact:
    lfs_disk: "{{ lfs_disk_bootstrap.files[0].path }}"

- name: ensure mountpoint exists for Linux from Scratch disk with proper permissions
  ansible.builtin.file:
    path: /mnt/linux-from-scratch
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: create Linux from Scratch partition
  community.general.parted:
    device: "{{ lfs_disk }}"
    label: gpt
    name: linux-from-scratch
    number: 1
    part_start: 1MiB
    part_end: 28GiB
    state: present

- name: create Linux from Scratch filesystem
  community.general.filesystem:
    fstype: ext4
    dev: "/dev/disk/by-partlabel/linux-from-scratch"

- name: ensure Linux from Scratch build disk is mounted
  ansible.posix.mount:
    src: PARTLABEL=linux-from-scratch
    path: /mnt/linux-from-scratch
    fstype: ext4
    opts: defaults,noatime
    passno: 2
    state: mounted

- name: create swap partition
  community.general.parted:
    device: "{{ lfs_disk }}"
    label: gpt
    name: swap
    flags: [ swap ]
    number: 2
    part_start: 28GiB
    part_end: 100%
    state: present

- name: create Linux from Scratch filesystem
  community.general.filesystem:
    fstype: swap
    dev: "/dev/disk/by-partlabel/swap"

- name: ensure Linux from Scratch swap is present
  ansible.posix.mount:
    src: PARTLABEL=swap
    path: none
    fstype: swap
    opts: sw
    state: present

- name: Ensure swap is active
  ansible.builtin.command: swapon -a
  changed_when: false
