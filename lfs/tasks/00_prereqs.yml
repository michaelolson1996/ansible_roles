- name: ensure directory layout is created
  ansible.builtin.file:
    path: "{{ dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "/mnt/lfs/etc"
    - "/mnt/lfs/var"
    - "/mnt/lfs/usr"
    - "/mnt/lfs/usr/bin"
    - "/mnt/lfs/usr/lib"
    - "/mnt/lfs/usr/sbin"
  loop_control:
    loop_var: dir
    label: "dir: {{ dir }}"
  
- name: ensure link layout is created
  ansible.builtin.file:
    src: "/mnt/lfs/usr/{{ ln }}"
    dest: "/mnt/lfs/{{ ln }}"
    state: link
    owner: root
    group: root
  loop:
    - "bin"
    - "lib"
    - "sbin"
  loop_control:
    loop_var: ln
    label: "link: /mnt/lfs/{{ ln }} -> /mnt/lfs/usr/{{ ln }}"

- name: ensure lib64 dir exists if target is an x86_64 machine
  ansible.builtin.file:
    path: "/mnt/lfs/lib64"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: "'x86_64' in ansible_facts.architecture"

- name: ensure directory layout is created
  ansible.builtin.file:
    path: "/mnt/lfs/tools"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: ensure lfs group exists
  ansible.builtin.group:
    name: lfs
    state: present

- name: ensure lfs user exists
  ansible.builtin.user:
    name: lfs
    shell: /bin/bash
    groups: lfs,ansible
    create_home: yes
    skeleton: /dev/null

