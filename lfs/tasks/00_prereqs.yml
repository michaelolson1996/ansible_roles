- name: ensure lib64 dir exists if target is an x86_64 machine
  ansible.builtin.file:
    path: "/mnt/lfs/lib64"
    owner: lfs
  when: "'x86_64' in ansible_facts.architecture"

- name: ensure lfs user .bash_profile exists
  ansible.builtin.copy:
    src: bash_profile
    dest: /home/lfs/.bash_profile
    owner: lfs
    group: lfs
    mode: '0644'

- name: ensure lfs user .bashrc exists
  ansible.builtin.copy:
    src: bashrc
    dest: /home/lfs/.bashrc
    owner: lfs
    group: lfs
    mode: '0644'


